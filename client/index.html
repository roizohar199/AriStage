<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ari Stage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-neutral-950 text-neutral-100">
    <div id="root"></div>
    <script type="module" src="/src/src/main.tsx"></script>

    <!-- Nagish.li Accessibility Toolbar -->
    <script>
      (function () {
        // Load runtime config dynamically to avoid blocking page load
        var configScript = document.createElement("script");
        configScript.src = "/runtime-config.js";
        configScript.async = true;

        configScript.onload = function () {
          // Check if Nagish.li is enabled via runtime config
          if (
            window.__RUNTIME__ &&
            window.__RUNTIME__.NAGISHLI_ENABLED === true
          ) {
            // Nagish.li v2.3 reads configuration from global variables (nl_*), not from an object.
            // Set these before loading the script.
            window.nl_lang = window.__RUNTIME__.NAGISHLI_LANG || "he";
            window.nl_pos = (
              window.__RUNTIME__.NAGISHLI_POS || "br"
            ).toLowerCase();
            window.nl_color = (
              window.__RUNTIME__.NAGISHLI_COLOR || "orange"
            ).toLowerCase();

            // Load the Nagish.li script
            var script = document.createElement("script");
            script.src = "/nagishli.js";
            script.async = true;
            script.onload = function () {
              // Log only in development (no console in production)
              if (
                location.hostname === "localhost" ||
                location.hostname === "127.0.0.1"
              ) {
                console.log("[Nagish.li] Loaded", {
                  nl_lang: window.nl_lang,
                  nl_pos: window.nl_pos,
                  nl_color: window.nl_color,
                  nl_compact: window.nl_compact,
                });
              }
            };
            script.onerror = function () {
              if (
                location.hostname === "localhost" ||
                location.hostname === "127.0.0.1"
              ) {
                console.warn("[Nagish.li] Failed to load nagishli.js");
              }
            };
            document.body.appendChild(script);
          }
        };

        configScript.onerror = function () {
          // Silently fail if runtime-config.js is not available
          if (
            location.hostname === "localhost" ||
            location.hostname === "127.0.0.1"
          ) {
            console.info(
              "[Nagish.li] Runtime config not available, skipping initialization",
            );
          }
        };

        document.head.appendChild(configScript);
      })();
    </script>
  </body>
</html>
